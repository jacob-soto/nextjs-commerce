steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/$PROJECT_ID/nextjs-commerce:$COMMIT_SHA"
      - "-t"
      - "gcr.io/$PROJECT_ID/nextjs-commerce:latest"
      - "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/nextjs-commerce:$COMMIT_SHA"

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/$PROJECT_ID/nextjs-commerce:latest"

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "nextjs-commerce"
      - "--image"
      - "gcr.io/$PROJECT_ID/nextjs-commerce:$COMMIT_SHA"
      - "--region"
      - "us-east4"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "512Mi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "1"
      - "--max-instances"
      - "10"

images:
  - "gcr.io/$PROJECT_ID/nextjs-commerce:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/nextjs-commerce:latest"

options:
  logging: CLOUD_LOGGING_ONLY
